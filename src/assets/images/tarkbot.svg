<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#42a5f5;stop-opacity:1"></stop>
    </linearGradient>
  </defs>

  <!-- Circle background -->
  <circle cx="100" cy="100" r="95" fill="#e3f2fd"></circle>

  <!-- Chat bubble -->
  <rect x="40" y="45" width="120" height="90" rx="25" fill="url(#grad1)"></rect>

  <!-- Tail -->
  <polygon points="80,135 100,135 90,160" fill="url(#grad1)"></polygon>

  <!-- Layer lines -->
  <rect x="65" y="65" width="80" height="10" rx="5" fill="white" opacity="0.9"></rect>
  <rect x="65" y="85" width="60" height="10" rx="5" fill="white" opacity="0.7"></rect>
  <rect x="65" y="105" width="40" height="10" rx="5" fill="white" opacity="0.5"></rect>

  <!-- AI node -->
  <circle cx="135" cy="115" r="7" fill="#ff7043"></circle>
</svg>